<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangles</title>

    <style>

        body {

            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .triangle {

            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #023047;
            transition: 0.4s ease;
        }


        .triangle:hover {
            
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 300px solid #c1121f;
        }

        .triangle-inverted {

            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #023047;
            transition: 0.4s ease;
            transform: rotate(180deg);
        }

        .triangle-inverted:hover {
            
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 300px solid #ffd166;
        }

        .triangle-last {

            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #023047;
            transition: 0.4s ease;
        }


        .triangle-last:hover {

            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 300px solid #6a994e;
        }

    </style>
</head>

<body>

    <div class="triangle"></div>
    <div class="triangle-inverted"></div>
    <div class="triangle-last"></div>

</body>

</html>
